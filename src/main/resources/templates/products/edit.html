<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">상품 수정</h4>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card border-0 shadow-sm p-4" style="max-width:600px;">
        <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">상품명</label>
                <input type="text" th:field="*{name}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">가격</label>
                <input type="number" th:field="*{price}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">재고</label>
                <input type="number" th:field="*{stock}" class="form-control" required/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">설명</label>
                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">수정 완료</button>
                <a th:href="@{/products}" class="btn btn-outline-secondary">취소</a>
            </div>
        </form>
    </div>
</div>

<!-- 푸터 -->
<footer class="text-center text-muted py-3 mt-4" style="font-size:0.85rem; border-top:1px solid #dee2e6;">
    실습 수행 일시: <span id="datetime"></span>
    &nbsp;│&nbsp; 학번: 2171271 &nbsp;│&nbsp; 성명: 안효성
</footer>
<script>
    function updateTime() {
        const now = new Date();
        const str = now.getFullYear() + '년 ' +
            String(now.getMonth()+1).padStart(2,'0') + '월 ' +
            String(now.getDate()).padStart(2,'0') + '일 ' +
            String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0') + ':' +
            String(now.getSeconds()).padStart(2,'0');
        document.getElementById('datetime').textContent = str;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
